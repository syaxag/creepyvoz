services:
  - type: web
    name: creepyvoz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      # Pega aquí tu ID de editor de AdSense (ej: ca-pub-1234567890123456) cuando lo tengas.
      - key: ADSENSE_PUBLISHER_ID
        sync: false
      - key: CONTACT_EMAIL
        sync: false
